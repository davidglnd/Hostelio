<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostelio</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script type="module" src="../js/main.js"></script>
</head>
<body data-page="expenses">
    <app-header></app-header>
    <main>
        <form>
            <label for="supplier">Proveedor</label>
            <input type="text" name="supplier" id="supplier" list="suppliers-list">
            <datalist id="suppliers-list">
                <option value="Proveedor por defecto 1">
            </datalist>

            <label for="amount">Cantidad</label>
            <input type="number" name="amount" id="amount">

            <label for="date">Fecha</label>
            <input type="date" name="date" id="date">

            <label for="concept">Concepto</label>
            <input type="text" name="concept" id="concept" list="concepts-list">

            <label for="description">Observaciones</label>
            <input type="text" name="description" id="description">

            <datalist id="concepts-list">
                <option value="cocepto por defecto 1">
            </datalist>

            <button type="submit">Añadir gasto</button>
        </form>
    </main>
    <div>
        <h3>Pagina en desarrollo temporalmente solo permite introducir gastos</h3>
    </div>
    
</body>
</html>
